<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCF Dashboard</title>

  <!-- ====================================================================
       Styles -- dark theme matching the main RCF app
       ==================================================================== -->
  <style>
    /* ---------------------------------------------------------------
       Design Tokens (from theme.css)
       --------------------------------------------------------------- */
    :root {
      --color-primary:    #1a2332;
      --color-secondary:  #2d3748;
      --color-accent:     #00b4d8;
      --color-text:       #f7fafc;
      --color-text-muted: #a0aec0;
      --color-bg:         #0f1621;
      --color-surface:    #1a2332;
      --color-border:     #2d3748;

      /* Phase colours */
      --phase-new:       #718096;
      --phase-defined:   #4299e1;
      --phase-designed:  #9f7aea;
      --phase-building:  #ed8936;
      --phase-testing:   #ecc94b;
      --phase-verified:  #48bb78;
      --phase-presented: #48bb78;

      /* Status colours */
      --status-ready:     #718096;
      --status-defining:  #4299e1;
      --status-building:  #ed8936;
      --status-reviewing: #d69e2e;
      --status-testing:   #ecc94b;
      --status-verified:  #48bb78;

      /* Test status */
      --test-pending:  #718096;
      --test-passing:  #48bb78;
      --test-failing:  #f56565;
      --test-defined:  #718096;
      --test-running:  #ed8936;
      --test-passed:   #48bb78;
      --test-failed:   #f56565;

      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      --font-size-xs:   0.75rem;
      --font-size-sm:   0.875rem;
      --font-size-base: 1rem;
      --font-size-lg:   1.25rem;
      --font-size-xl:   1.5rem;
      --font-size-2xl:  2rem;
      --font-size-3xl:  2.5rem;
      --line-height:    1.6;

      /* Spacing */
      --space-xs:  0.25rem;
      --space-sm:  0.5rem;
      --space-md:  1rem;
      --space-lg:  1.5rem;
      --space-xl:  2rem;
      --space-2xl: 3rem;

      /* Layout */
      --radius:     8px;
      --radius-sm:  4px;
      --transition: 150ms ease;
    }

    /* ---------------------------------------------------------------
       Reset
       --------------------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: var(--line-height);
      color: var(--color-text);
      background-color: var(--color-bg);
      min-height: 100vh;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------------------------------------------------------------
       Layout
       --------------------------------------------------------------- */
    .container {
      width: 100%;
      max-width: 1400px;
      margin-inline: auto;
      padding-inline: var(--space-xl);
    }

    /* ---------------------------------------------------------------
       Header
       --------------------------------------------------------------- */
    .site-header {
      padding: var(--space-xl) 0;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .project-name {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    /* Phase badge */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-md);
      border-radius: 100px;
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-bg);
    }

    .phase-badge[data-phase="new"]       { background: var(--phase-new); }
    .phase-badge[data-phase="defined"]    { background: var(--phase-defined); }
    .phase-badge[data-phase="designed"]   { background: var(--phase-designed); }
    .phase-badge[data-phase="building"]   { background: var(--phase-building); }
    .phase-badge[data-phase="testing"]    { background: var(--phase-testing); color: var(--color-primary); }
    .phase-badge[data-phase="verified"]   { background: var(--phase-verified); }
    .phase-badge[data-phase="presented"]  { background: var(--phase-presented); }

    /* Connection indicator */
    .connection-indicator {
      display: flex;
      align-items: center;
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--test-failing);
      transition: background var(--transition);
      opacity: 0.6;
    }

    .connection-dot.connected {
      background: var(--test-passing);
      box-shadow: 0 0 4px var(--test-passing);
      opacity: 0.8;
    }

    /* ---------------------------------------------------------------
       Section wrappers
       --------------------------------------------------------------- */
    main {
      padding: var(--space-xl) 0 var(--space-2xl);
    }

    .section {
      margin-bottom: var(--space-2xl);
    }

    .section-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--color-border);
    }

    /* ---------------------------------------------------------------
       Empty state
       --------------------------------------------------------------- */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
    }

    .empty-state p {
      margin-bottom: var(--space-sm);
    }

    .empty-state code {
      color: var(--color-accent);
      font-size: var(--font-size-sm);
    }

    /* ---------------------------------------------------------------
       Section 1: Pipeline Board
       --------------------------------------------------------------- */
    .pipeline-board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-md);
      min-height: 200px;
    }

    @media (max-width: 900px) {
      .pipeline-board {
        grid-template-columns: 1fr;
      }
    }

    .pipeline-column {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 180px;
    }

    .pipeline-column-header {
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      border-bottom: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pipeline-column-header .count {
      background: var(--color-secondary);
      padding: 0 var(--space-sm);
      border-radius: 100px;
      font-size: var(--font-size-xs);
      min-width: 20px;
      text-align: center;
    }

    .pipeline-column[data-stage="defined"]  .pipeline-column-header { border-bottom-color: var(--phase-defined); }
    .pipeline-column[data-stage="designed"] .pipeline-column-header { border-bottom-color: var(--phase-designed); }
    .pipeline-column[data-stage="building"] .pipeline-column-header { border-bottom-color: var(--phase-building); }
    .pipeline-column[data-stage="testing"]  .pipeline-column-header { border-bottom-color: var(--phase-testing); }
    .pipeline-column[data-stage="verified"] .pipeline-column-header { border-bottom-color: var(--phase-verified); }

    .pipeline-cards {
      padding: var(--space-sm);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .pipeline-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      border-left: 3px solid var(--color-border);
      transition: border-color var(--transition), background var(--transition);
    }

    .pipeline-card:hover {
      background: var(--color-secondary);
    }

    .pipeline-card[data-priority="must"]   { border-left-color: var(--test-failing); }
    .pipeline-card[data-priority="should"] { border-left-color: var(--phase-building); }
    .pipeline-card[data-priority="could"]  { border-left-color: var(--phase-defined); }

    .pipeline-card .req-id {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 2px;
    }

    .pipeline-card .req-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      margin-bottom: var(--space-xs);
    }

    .pipeline-card .req-meta {
      display: flex;
      gap: var(--space-md);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* ---------------------------------------------------------------
       Section 2: Build Specs Progress
       --------------------------------------------------------------- */
    .build-specs-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .build-spec-row {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-md) var(--space-lg);
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: var(--space-lg);
      align-items: center;
    }

    @media (max-width: 700px) {
      .build-spec-row {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
      }
    }

    .build-spec-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      white-space: nowrap;
    }

    .build-spec-info {
      min-width: 0;
    }

    .build-spec-title {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .build-spec-ac {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--space-sm);
      border-radius: 100px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .status-badge[data-status="ready"]     { background: rgba(113,128,150,0.2); color: var(--status-ready); }
    .status-badge[data-status="defining"]   { background: rgba(66,153,225,0.2);  color: var(--status-defining); }
    .status-badge[data-status="building"]   { background: rgba(237,137,54,0.2);  color: var(--status-building); }
    .status-badge[data-status="reviewing"]  { background: rgba(214,158,46,0.2);  color: var(--status-reviewing); }
    .status-badge[data-status="testing"]    { background: rgba(236,201,75,0.2);  color: var(--status-testing); }
    .status-badge[data-status="verified"]   { background: rgba(72,187,120,0.2);  color: var(--status-verified); }

    /* 5-stage progress bar */
    .stage-progress {
      display: flex;
      gap: 2px;
      width: 120px;
    }

    .stage-progress .stage-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--color-secondary);
      transition: background var(--transition);
    }

    .stage-progress .stage-segment.active {
      background: var(--color-accent);
    }

    .stage-progress .stage-segment.complete {
      background: var(--phase-verified);
    }

    /* ---------------------------------------------------------------
       Section 3: Traceability Matrix
       --------------------------------------------------------------- */
    .trace-tree {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .trace-node {
      border-bottom: 1px solid var(--color-border);
    }

    .trace-node:last-child {
      border-bottom: none;
    }

    .trace-node-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }

    .trace-node-header:hover {
      background: var(--color-secondary);
    }

    .trace-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .trace-toggle.expanded {
      transform: rotate(90deg);
    }

    .trace-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      flex-shrink: 0;
    }

    .trace-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trace-status-indicators {
      display: flex;
      gap: var(--space-sm);
      flex-shrink: 0;
    }

    .trace-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--color-border);
    }

    .trace-indicator.green  { background: var(--phase-verified); border-color: var(--phase-verified); }
    .trace-indicator.orange { background: var(--phase-building); border-color: var(--phase-building); }
    .trace-indicator.grey   { background: var(--color-secondary); }
    .trace-indicator.red    { background: var(--test-failing);   border-color: var(--test-failing); }

    .trace-children {
      display: none;
      padding-left: var(--space-xl);
    }

    .trace-children.open {
      display: block;
    }

    .trace-leaf {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) var(--space-md);
      border-bottom: 1px solid var(--color-border);
    }

    .trace-leaf:last-child {
      border-bottom: none;
    }

    .trace-leaf-labels {
      display: flex;
      gap: var(--space-sm);
      margin-left: auto;
      flex-shrink: 0;
    }

    .trace-leaf-label {
      font-size: var(--font-size-xs);
      padding: 1px var(--space-sm);
      border-radius: var(--radius-sm);
      background: var(--color-secondary);
      color: var(--color-text-muted);
    }

    .trace-leaf-label.verified { background: rgba(72,187,120,0.2);  color: var(--phase-verified); }
    .trace-leaf-label.progress { background: rgba(237,137,54,0.2);  color: var(--phase-building); }
    .trace-leaf-label.failing  { background: rgba(245,101,101,0.2); color: var(--test-failing); }

    /* ---------------------------------------------------------------
       Section 4: Coverage Summary
       --------------------------------------------------------------- */
    .coverage-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: var(--space-xl);
      align-items: center;
    }

    @media (max-width: 800px) {
      .coverage-grid {
        grid-template-columns: 1fr;
        justify-items: center;
      }
    }

    .gauge-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    /* CSS-only circular gauge */
    .gauge {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .gauge svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .gauge-bg {
      fill: none;
      stroke: var(--color-secondary);
      stroke-width: 8;
    }

    .gauge-fill {
      fill: none;
      stroke: var(--color-accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .gauge-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-text);
    }

    .gauge-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      text-align: center;
    }

    .overall-coverage {
      text-align: center;
    }

    .overall-percent {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
    }

    .overall-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-top: var(--space-xs);
    }

    /* ---------------------------------------------------------------
       Footer
       --------------------------------------------------------------- */
    .site-footer {
      padding: var(--space-lg) 0;
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }

    .site-footer a {
      color: var(--color-accent);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .last-updated {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* ---------------------------------------------------------------
       Project Overview
       --------------------------------------------------------------- */
    .project-overview {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-xl);
    }

    .project-overview-header {
      margin-bottom: var(--space-lg);
    }

    .project-overview-name {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .project-overview-description {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      line-height: var(--line-height);
      max-width: 72ch;
    }

    .project-overview-phase {
      margin-bottom: var(--space-lg);
    }

    .project-overview-stats {
      display: flex;
      gap: var(--space-xl);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
    }

    .stat-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ---------------------------------------------------------------
       Utility
       --------------------------------------------------------------- */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>

  <!-- ====================================================================
       Header
       ==================================================================== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-left">
          <h1 class="project-name" id="projectName">RCF Dashboard</h1>
          <span class="phase-badge" id="phaseBadge" data-phase="new">New</span>
        </div>
        <div class="header-right">
          <div class="connection-indicator">
            <span class="connection-dot" id="connectionDot" title="Live file watcher -- updates dashboard when RCF documents change"></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ====================================================================
       Main content
       ==================================================================== -->
  <main>
    <div class="container">

      <!-- Section 0: Project Overview -->
      <section class="section" id="sectionOverview">
        <div id="overviewContent"></div>
      </section>

      <!-- Section 1: Pipeline Board -->
      <section class="section" id="sectionPipeline">
        <h2 class="section-title">Pipeline Board</h2>
        <div id="pipelineContent"></div>
      </section>

      <!-- Section 2: Build Specs Progress -->
      <section class="section" id="sectionBuildSpecs">
        <h2 class="section-title">Build Specs Progress</h2>
        <div id="buildSpecsContent"></div>
      </section>

      <!-- Section 3: Traceability Matrix -->
      <section class="section" id="sectionTrace">
        <h2 class="section-title">Traceability Matrix</h2>
        <div id="traceContent"></div>
      </section>

      <!-- Section 4: Coverage Summary -->
      <section class="section" id="sectionCoverage">
        <h2 class="section-title">Coverage Summary</h2>
        <div id="coverageContent"></div>
      </section>

    </div>
  </main>

  <!-- ====================================================================
       Footer
       ==================================================================== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <span>Built on RCF Methodology</span>
        <span class="last-updated" id="lastUpdated">Last updated: --</span>
      </div>
    </div>
  </footer>

  <!-- ====================================================================
       Application logic
       ==================================================================== -->
  <script type="module">

    // -------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------

    let projectData = null;
    let sseConnected = false;

    // -------------------------------------------------------------------
    // Data fetching
    // -------------------------------------------------------------------

    async function fetchProjectData() {
      try {
        const res = await fetch('/api/project');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        projectData = await res.json();
        render();
      } catch (err) {
        console.error('Failed to fetch project data:', err);
      }
    }

    // -------------------------------------------------------------------
    // SSE connection
    // -------------------------------------------------------------------

    function connectSSE() {
      const es = new EventSource('/api/events');

      es.addEventListener('connected', () => {
        sseConnected = true;
        updateConnectionUI();
      });

      es.addEventListener('change', (event) => {
        // Re-fetch all data on any file change
        fetchProjectData();
      });

      es.onerror = () => {
        sseConnected = false;
        updateConnectionUI();
        es.close();
        // Retry after 5 seconds
        setTimeout(connectSSE, 5000);
      };
    }

    function updateConnectionUI() {
      const dot = document.getElementById('connectionDot');
      if (sseConnected) {
        dot.classList.add('connected');
      } else {
        dot.classList.remove('connected');
      }
    }

    // -------------------------------------------------------------------
    // Rendering
    // -------------------------------------------------------------------

    function render() {
      if (!projectData) return;

      renderHeader();
      renderOverview();
      renderPipeline();
      renderBuildSpecs();
      renderTrace();
      renderCoverage();
      renderTimestamp();
    }

    // --- Header --------------------------------------------------------

    function renderHeader() {
      const { project } = projectData;
      if (!project) return;

      document.getElementById('projectName').textContent = project.name || 'RCF Dashboard';
      document.title = `${project.name || 'RCF Dashboard'} - Dashboard`;

      const badge = document.getElementById('phaseBadge');
      badge.dataset.phase = project.phase || 'new';
      badge.textContent = project.phase || 'new';
    }

    // --- Project Overview -----------------------------------------------

    function renderOverview() {
      const container = document.getElementById('overviewContent');
      const { project, prd, buildSpecs, testSpecs } = projectData;

      if (!project) {
        container.innerHTML = renderEmptyState(
          'No project defined yet.',
          'Open Claude Code and run <code>/define</code> to get started.'
        );
        return;
      }

      const totalReqs = prd?.requirements?.length || 0;
      const totalAc = (prd?.requirements || []).reduce((sum, r) =>
        sum + (r.stories || []).reduce((s2, st) => s2 + (st.acceptanceCriteria?.length || 0), 0)
      , 0);

      const totalBs = (buildSpecs || []).length;
      const verifiedBs = (buildSpecs || []).filter(bs => bs.status === 'verified').length;

      let passingTests = 0;
      for (const ts of (testSpecs || [])) {
        passingTests += (ts.testCases || []).filter(tc => tc.status === 'passing').length;
      }

      const phase = project.phase || 'new';
      const description = project.description || '';

      let html = '<div class="project-overview">';
      html += '<div class="project-overview-header">';
      html += `<div class="project-overview-name">${esc(project.name || 'Untitled Project')}</div>`;
      if (description) {
        html += `<div class="project-overview-description">${esc(description)}</div>`;
      }
      html += '</div>';
      html += `<div class="project-overview-phase">
        <span class="phase-badge" data-phase="${phase}">${capitalize(phase)}</span>
      </div>`;
      html += '<div class="project-overview-stats">';
      html += `<div class="stat-item"><span class="stat-value">${totalReqs}</span><span class="stat-label">Requirements</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${totalAc}</span><span class="stat-label">Acceptance Criteria</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${verifiedBs}/${totalBs}</span><span class="stat-label">Build Specs Verified</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${passingTests}</span><span class="stat-label">Tests Passing</span></div>`;
      html += '</div>';
      html += '</div>';

      container.innerHTML = html;
    }

    // --- Pipeline Board ------------------------------------------------

    function renderPipeline() {
      const container = document.getElementById('pipelineContent');
      const { prd, buildSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState(
          'No requirements defined yet.',
          'Run <code>/define</code> to get started.'
        );
        return;
      }

      // Determine the furthest stage for each requirement based on its build specs
      const stageOrder = ['defined', 'designed', 'building', 'testing', 'verified'];
      const stageMap = { ready: 'defined', defining: 'defined', building: 'building', reviewing: 'testing', testing: 'testing', verified: 'verified' };

      // Map requirements to their pipeline stage
      const columns = {
        defined:  [],
        designed: [],
        building: [],
        testing:  [],
        verified: [],
      };

      for (const req of prd.requirements) {
        // Find build specs for this requirement
        const reqSpecs = (buildSpecs || []).filter(bs => bs.requirement === req.id);

        // Count total AC and passing tests
        const totalAc = (req.stories || []).reduce((sum, s) => sum + (s.acceptanceCriteria?.length || 0), 0);
        const passingTests = countPassingTestsForReq(req.id);

        let stage = 'defined'; // default
        if (reqSpecs.length > 0) {
          // Furthest stage among build specs
          let maxIdx = 0;
          for (const bs of reqSpecs) {
            const mapped = stageMap[bs.status] || 'defined';
            const idx = stageOrder.indexOf(mapped);
            if (idx > maxIdx) maxIdx = idx;
          }
          stage = stageOrder[maxIdx];
        }

        // If there are build specs but the req has no stage past defined,
        // check if design exists to mark as designed
        if (stage === 'defined' && projectData.design) {
          const hasDesign = projectData.design.components?.some(c =>
            c.tracesTo?.includes(req.id)
          );
          if (hasDesign) stage = 'designed';
        }

        columns[stage].push({
          id: req.id,
          title: req.title,
          priority: req.priority || 'could',
          acCount: totalAc,
          passingTests,
        });
      }

      let html = '<div class="pipeline-board">';
      for (const stage of stageOrder) {
        const cards = columns[stage];
        html += `
          <div class="pipeline-column" data-stage="${stage}">
            <div class="pipeline-column-header">
              <span>${capitalize(stage)}</span>
              <span class="count">${cards.length}</span>
            </div>
            <div class="pipeline-cards">
              ${cards.length === 0 ? '' : cards.map(c => `
                <div class="pipeline-card" data-priority="${c.priority}">
                  <div class="req-id">${esc(c.id)}</div>
                  <div class="req-title">${esc(c.title)}</div>
                  <div class="req-meta">
                    <span>${c.acCount} AC</span>
                    <span>${c.passingTests} tests passing</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
      }
      html += '</div>';
      container.innerHTML = html;
    }

    // --- Build Specs Progress ------------------------------------------

    function renderBuildSpecs() {
      const container = document.getElementById('buildSpecsContent');
      const { buildSpecs } = projectData;

      if (!buildSpecs || buildSpecs.length === 0) {
        container.innerHTML = renderEmptyState(
          'No build specs yet.',
          'Build specs are generated during the <code>/build</code> phase.'
        );
        return;
      }

      // Sort by order field, then by ID
      const sorted = [...buildSpecs].sort((a, b) => (a.order || 999) - (b.order || 999));

      const stages = ['ready', 'defining', 'building', 'reviewing', 'testing', 'verified'];

      let html = '<div class="build-specs-list">';
      for (const bs of sorted) {
        const stageIdx = stages.indexOf(bs.status);
        const segmentsHtml = stages.slice(1).map((_, i) => {
          // 5 segments for 5 stages (defining through verified)
          let cls = 'stage-segment';
          if (i < stageIdx) cls += ' complete';
          else if (i === stageIdx && stageIdx > 0) cls += ' active';
          return `<div class="${cls}"></div>`;
        }).join('');

        html += `
          <div class="build-spec-row">
            <span class="build-spec-id">${esc(bs.id)}</span>
            <div class="build-spec-info">
              <div class="build-spec-title">${esc(bs.title)}</div>
              <div class="build-spec-ac">${(bs.acceptanceCriteria || []).length} acceptance criteria</div>
            </div>
            <div class="stage-progress" title="Build cycle stage: ${bs.status}">
              ${segmentsHtml}
            </div>
            <span class="status-badge" data-status="${bs.status}">${esc(bs.status)}</span>
          </div>`;
      }
      html += '</div>';
      container.innerHTML = html;
    }

    // --- Traceability Matrix -------------------------------------------

    function renderTrace() {
      const container = document.getElementById('traceContent');
      const { prd, buildSpecs, testSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState(
          'No traceability data available.',
          'Define requirements first with <code>/define</code>.'
        );
        return;
      }

      // Build lookup maps
      const bsByReqStory = {};
      for (const bs of (buildSpecs || [])) {
        const key = `${bs.requirement}/${bs.story}`;
        if (!bsByReqStory[key]) bsByReqStory[key] = [];
        bsByReqStory[key].push(bs);
      }

      const bsById = {};
      for (const bs of (buildSpecs || [])) {
        bsById[bs.id] = bs;
      }

      const tsByBs = {};
      for (const ts of (testSpecs || [])) {
        if (!tsByBs[ts.buildSpec]) tsByBs[ts.buildSpec] = [];
        tsByBs[ts.buildSpec].push(ts);
      }

      let html = '<div class="trace-tree">';

      for (const req of prd.requirements) {
        const reqNodeId = `trace-${req.id}`;
        const reqColour = getReqColour(req, buildSpecs, testSpecs);

        html += `
          <div class="trace-node">
            <div class="trace-node-header" onclick="toggleTrace('${reqNodeId}')">
              <span class="trace-toggle" id="toggle-${reqNodeId}">&#9654;</span>
              <span class="trace-id">${esc(req.id)}</span>
              <span class="trace-title">${esc(req.title)}</span>
              <div class="trace-status-indicators">
                <span class="trace-indicator ${reqColour}" title="Overall status"></span>
              </div>
            </div>
            <div class="trace-children" id="${reqNodeId}">`;

        for (const story of (req.stories || [])) {
          const storyNodeId = `trace-${story.id}`;
          const storyColour = getStoryColour(story, req.id, bsByReqStory, tsByBs);

          html += `
              <div class="trace-node">
                <div class="trace-node-header" onclick="toggleTrace('${storyNodeId}')">
                  <span class="trace-toggle" id="toggle-${storyNodeId}">&#9654;</span>
                  <span class="trace-id">${esc(story.id)}</span>
                  <span class="trace-title">${esc(story.title)}</span>
                  <div class="trace-status-indicators">
                    <span class="trace-indicator ${storyColour}" title="Story status"></span>
                  </div>
                </div>
                <div class="trace-children" id="${storyNodeId}">`;

          for (const ac of (story.acceptanceCriteria || [])) {
            const acBuildStatus = getAcBuildStatus(ac.id, buildSpecs);
            const acTestStatus = getAcTestStatus(ac.id, testSpecs);

            html += `
                  <div class="trace-leaf">
                    <span class="trace-id">${esc(ac.id)}</span>
                    <span class="trace-title">${esc(ac.given ? `Given ${ac.given}` : '')}</span>
                    <div class="trace-leaf-labels">
                      <span class="trace-leaf-label ${acBuildStatus.cls}">${esc(acBuildStatus.text)}</span>
                      <span class="trace-leaf-label ${acTestStatus.cls}">${esc(acTestStatus.text)}</span>
                    </div>
                  </div>`;
          }

          html += `
                </div>
              </div>`;
        }

        html += `
            </div>
          </div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    // --- Coverage Summary ----------------------------------------------

    function renderCoverage() {
      const container = document.getElementById('coverageContent');
      const { prd, buildSpecs, testSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState(
          'No coverage data yet.',
          'Coverage tracks as you progress through the RCF cycle.'
        );
        return;
      }

      // Calculate coverage metrics
      const totalReqs = prd.requirements.length;
      const totalStories = prd.requirements.reduce((sum, r) => sum + (r.stories?.length || 0), 0);
      const totalAc = prd.requirements.reduce((sum, r) =>
        sum + (r.stories || []).reduce((s2, st) => s2 + (st.acceptanceCriteria?.length || 0), 0)
      , 0);

      // Stories with at least one AC
      const storiesWithAc = prd.requirements.reduce((sum, r) =>
        sum + (r.stories || []).filter(s => s.acceptanceCriteria?.length > 0).length
      , 0);

      // Reqs with at least one story
      const reqsWithStories = prd.requirements.filter(r => r.stories?.length > 0).length;

      // AC with at least one test case covering them
      const testedAcIds = new Set();
      for (const ts of (testSpecs || [])) {
        for (const tc of (ts.testCases || [])) {
          if (tc.verifiesAc) testedAcIds.add(tc.verifiesAc);
        }
      }

      const reqStoryPct = totalReqs > 0 ? Math.round((reqsWithStories / totalReqs) * 100) : 0;
      const storyAcPct = totalStories > 0 ? Math.round((storiesWithAc / totalStories) * 100) : 0;
      const acTestPct = totalAc > 0 ? Math.round((testedAcIds.size / totalAc) * 100) : 0;
      const overallPct = Math.round((reqStoryPct + storyAcPct + acTestPct) / 3);

      const circumference = 2 * Math.PI * 48; // radius = 48

      container.innerHTML = `
        <div class="coverage-grid">
          ${renderGauge(reqStoryPct, 'Reqs with Stories', circumference)}
          ${renderGauge(storyAcPct, 'Stories with AC', circumference)}
          ${renderGauge(acTestPct, 'AC with Tests', circumference)}
          <div class="overall-coverage">
            <div class="overall-percent">${overallPct}%</div>
            <div class="overall-label">Overall Coverage</div>
          </div>
        </div>`;
    }

    function renderGauge(pct, label, circumference) {
      const offset = circumference - (pct / 100) * circumference;
      return `
        <div class="gauge-wrapper">
          <div class="gauge">
            <svg viewBox="0 0 120 120">
              <circle class="gauge-bg" cx="60" cy="60" r="48" />
              <circle class="gauge-fill" cx="60" cy="60" r="48"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}" />
            </svg>
            <span class="gauge-text">${pct}%</span>
          </div>
          <span class="gauge-label">${label}</span>
        </div>`;
    }

    // --- Timestamp -----------------------------------------------------

    function renderTimestamp() {
      const el = document.getElementById('lastUpdated');
      const ts = projectData?._meta?.timestamp;
      if (ts) {
        const d = new Date(ts);
        el.textContent = `Last updated: ${d.toLocaleTimeString()}`;
      }
    }

    // -------------------------------------------------------------------
    // Helpers
    // -------------------------------------------------------------------

    function renderEmptyState(title, hint) {
      return `<div class="empty-state"><p>${title}</p><p>${hint}</p></div>`;
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function esc(s) {
      if (!s) return '';
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    function countPassingTestsForReq(reqId) {
      const { testSpecs, buildSpecs } = projectData;
      if (!testSpecs || !buildSpecs) return 0;
      const reqBsIds = new Set(buildSpecs.filter(bs => bs.requirement === reqId).map(bs => bs.id));
      let count = 0;
      for (const ts of testSpecs) {
        if (reqBsIds.has(ts.buildSpec)) {
          count += (ts.testCases || []).filter(tc => tc.status === 'passing').length;
        }
      }
      return count;
    }

    function getReqColour(req, buildSpecs, testSpecs) {
      const reqBs = (buildSpecs || []).filter(bs => bs.requirement === req.id);
      if (reqBs.length === 0) return 'grey';
      if (reqBs.every(bs => bs.status === 'verified')) return 'green';
      if (reqBs.some(bs => ['building', 'reviewing', 'testing', 'defining'].includes(bs.status))) return 'orange';
      // Check for failing tests
      for (const bs of reqBs) {
        const ts = (testSpecs || []).filter(t => t.buildSpec === bs.id);
        if (ts.some(t => t.status === 'failed')) return 'red';
      }
      return 'grey';
    }

    function getStoryColour(story, reqId, bsByReqStory, tsByBs) {
      const key = `${reqId}/${story.id}`;
      const specs = bsByReqStory[key] || [];
      if (specs.length === 0) return 'grey';
      if (specs.every(bs => bs.status === 'verified')) return 'green';
      if (specs.some(bs => ['building', 'reviewing', 'testing', 'defining'].includes(bs.status))) return 'orange';
      return 'grey';
    }

    function getAcBuildStatus(acId, buildSpecs) {
      for (const bs of (buildSpecs || [])) {
        if ((bs.acceptanceCriteria || []).includes(acId)) {
          if (bs.status === 'verified') return { text: 'Built', cls: 'verified' };
          if (['building', 'reviewing', 'testing', 'defining'].includes(bs.status)) return { text: bs.status, cls: 'progress' };
          return { text: 'Ready', cls: '' };
        }
      }
      return { text: 'No spec', cls: '' };
    }

    function getAcTestStatus(acId, testSpecs) {
      for (const ts of (testSpecs || [])) {
        for (const tc of (ts.testCases || [])) {
          if (tc.verifiesAc === acId) {
            if (tc.status === 'passing') return { text: 'Passing', cls: 'verified' };
            if (tc.status === 'failing') return { text: 'Failing', cls: 'failing' };
            return { text: 'Pending', cls: 'progress' };
          }
        }
      }
      return { text: 'No test', cls: '' };
    }

    // Expose toggle function globally for onclick handlers
    window.toggleTrace = function(nodeId) {
      const children = document.getElementById(nodeId);
      const toggle = document.getElementById(`toggle-${nodeId}`);
      if (children) {
        children.classList.toggle('open');
      }
      if (toggle) {
        toggle.classList.toggle('expanded');
      }
    };

    // -------------------------------------------------------------------
    // Init
    // -------------------------------------------------------------------

    fetchProjectData();
    connectSSE();

  </script>
</body>
</html>
