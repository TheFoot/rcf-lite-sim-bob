<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCF Dashboard</title>

  <!-- ====================================================================
       Styles -- dark theme matching the main RCF app
       ==================================================================== -->
  <style>
    /* ---------------------------------------------------------------
       Design Tokens (from theme.css)
       --------------------------------------------------------------- */
    :root {
      --color-primary:    #1a2332;
      --color-secondary:  #2d3748;
      --color-accent:     #00b4d8;
      --color-text:       #f7fafc;
      --color-text-muted: #a0aec0;
      --color-bg:         #0f1621;
      --color-surface:    #1a2332;
      --color-border:     #2d3748;

      /* Phase colours */
      --phase-new:       #718096;
      --phase-defined:   #4299e1;
      --phase-designed:  #9f7aea;
      --phase-building:  #ed8936;
      --phase-testing:   #ecc94b;
      --phase-verified:  #48bb78;
      --phase-presented: #48bb78;

      /* Status colours */
      --status-ready:     #718096;
      --status-defining:  #4299e1;
      --status-building:  #ed8936;
      --status-reviewing: #d69e2e;
      --status-testing:   #ecc94b;
      --status-verified:  #48bb78;

      /* Test status */
      --test-pending:  #718096;
      --test-passing:  #48bb78;
      --test-failing:  #f56565;
      --test-defined:  #718096;
      --test-running:  #ed8936;
      --test-passed:   #48bb78;
      --test-failed:   #f56565;

      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      --font-size-xs:   0.75rem;
      --font-size-sm:   0.875rem;
      --font-size-base: 1rem;
      --font-size-lg:   1.25rem;
      --font-size-xl:   1.5rem;
      --font-size-2xl:  2rem;
      --font-size-3xl:  2.5rem;
      --line-height:    1.6;

      /* Spacing */
      --space-xs:  0.25rem;
      --space-sm:  0.5rem;
      --space-md:  1rem;
      --space-lg:  1.5rem;
      --space-xl:  2rem;
      --space-2xl: 3rem;

      /* Layout */
      --radius:     8px;
      --radius-sm:  4px;
      --transition: 150ms ease;
    }

    /* ---------------------------------------------------------------
       Reset
       --------------------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      line-height: var(--line-height);
      color: var(--color-text);
      background-color: var(--color-bg);
      min-height: 100vh;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---------------------------------------------------------------
       Layout
       --------------------------------------------------------------- */
    .container {
      width: 100%;
      max-width: 1400px;
      margin-inline: auto;
      padding-inline: var(--space-xl);
    }

    /* ---------------------------------------------------------------
       Header
       --------------------------------------------------------------- */
    .site-header {
      padding: var(--space-xl) 0;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .project-name {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    /* Phase badge */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-md);
      border-radius: 100px;
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-bg);
    }

    .phase-badge[data-phase="new"]       { background: var(--phase-new); }
    .phase-badge[data-phase="defined"]    { background: var(--phase-defined); }
    .phase-badge[data-phase="designed"]   { background: var(--phase-designed); }
    .phase-badge[data-phase="building"]   { background: var(--phase-building); }
    .phase-badge[data-phase="testing"]    { background: var(--phase-testing); color: var(--color-primary); }
    .phase-badge[data-phase="verified"]   { background: var(--phase-verified); }
    .phase-badge[data-phase="presented"]  { background: var(--phase-presented); }

    /* Connection indicator */
    .connection-indicator {
      display: flex;
      align-items: center;
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--test-failing);
      transition: background var(--transition);
      opacity: 0.6;
    }

    .connection-dot.connected {
      background: var(--test-passing);
      box-shadow: 0 0 4px var(--test-passing);
      opacity: 0.8;
    }

    /* ---------------------------------------------------------------
       Section wrappers
       --------------------------------------------------------------- */
    main {
      padding: var(--space-xl) 0 var(--space-2xl);
    }

    .section {
      margin-bottom: var(--space-2xl);
    }

    .section-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-sm);
      border-bottom: 1px solid var(--color-border);
    }

    /* ---------------------------------------------------------------
       Empty state
       --------------------------------------------------------------- */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
    }

    .empty-state p {
      margin-bottom: var(--space-sm);
    }

    .empty-state code {
      color: var(--color-accent);
      font-size: var(--font-size-sm);
    }

    /* ---------------------------------------------------------------
       Section 1: Pipeline Board
       --------------------------------------------------------------- */
    .pipeline-board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-md);
      min-height: 200px;
    }

    @media (max-width: 900px) {
      .pipeline-board {
        grid-template-columns: 1fr;
      }
    }

    .pipeline-column {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 180px;
    }

    .pipeline-column-header {
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      border-bottom: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pipeline-column-header .count {
      background: var(--color-secondary);
      padding: 0 var(--space-sm);
      border-radius: 100px;
      font-size: var(--font-size-xs);
      min-width: 20px;
      text-align: center;
    }

    .pipeline-column[data-stage="defined"]  .pipeline-column-header { border-bottom-color: var(--phase-defined); }
    .pipeline-column[data-stage="designed"] .pipeline-column-header { border-bottom-color: var(--phase-designed); }
    .pipeline-column[data-stage="building"] .pipeline-column-header { border-bottom-color: var(--phase-building); }
    .pipeline-column[data-stage="testing"]  .pipeline-column-header { border-bottom-color: var(--phase-testing); }
    .pipeline-column[data-stage="verified"] .pipeline-column-header { border-bottom-color: var(--phase-verified); }

    .pipeline-cards {
      padding: var(--space-sm);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .pipeline-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      border-left: 3px solid var(--color-border);
      transition: border-color var(--transition), background var(--transition);
      cursor: pointer;
    }

    .pipeline-card:hover {
      background: var(--color-secondary);
    }

    .pipeline-card[data-priority="must"]   { border-left-color: var(--test-failing); }
    .pipeline-card[data-priority="should"] { border-left-color: var(--phase-building); }
    .pipeline-card[data-priority="could"]  { border-left-color: var(--phase-defined); }

    .pipeline-card .req-id {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 2px;
    }

    .pipeline-card .req-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      margin-bottom: var(--space-xs);
    }

    .pipeline-card .req-meta {
      display: flex;
      gap: var(--space-md);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* ---------------------------------------------------------------
       Section 2: Build Specs Progress
       --------------------------------------------------------------- */
    .build-specs-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .build-spec-row {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-md) var(--space-lg);
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: var(--space-lg);
      align-items: center;
    }

    @media (max-width: 700px) {
      .build-spec-row {
        grid-template-columns: 1fr;
        gap: var(--space-sm);
      }
    }

    .build-spec-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      white-space: nowrap;
    }

    .build-spec-info {
      min-width: 0;
    }

    .build-spec-title {
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .build-spec-ac {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--space-sm);
      border-radius: 100px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .status-badge[data-status="ready"]     { background: rgba(113,128,150,0.2); color: var(--status-ready); }
    .status-badge[data-status="defining"]   { background: rgba(66,153,225,0.2);  color: var(--status-defining); }
    .status-badge[data-status="building"]   { background: rgba(237,137,54,0.2);  color: var(--status-building); }
    .status-badge[data-status="reviewing"]  { background: rgba(214,158,46,0.2);  color: var(--status-reviewing); }
    .status-badge[data-status="testing"]    { background: rgba(236,201,75,0.2);  color: var(--status-testing); }
    .status-badge[data-status="verified"]   { background: rgba(72,187,120,0.2);  color: var(--status-verified); }

    /* 5-stage progress bar */
    .stage-progress {
      display: flex;
      gap: 2px;
      width: 120px;
    }

    .stage-progress .stage-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--color-secondary);
      transition: background var(--transition);
    }

    .stage-progress .stage-segment.active {
      background: var(--color-accent);
    }

    .stage-progress .stage-segment.complete {
      background: var(--phase-verified);
    }

    /* ---------------------------------------------------------------
       Section 3: Traceability Matrix
       --------------------------------------------------------------- */
    .trace-tree {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .trace-node {
      border-bottom: 1px solid var(--color-border);
    }

    .trace-node:last-child {
      border-bottom: none;
    }

    .trace-node-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }

    .trace-node-header:hover {
      background: var(--color-secondary);
    }

    .trace-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      transition: transform var(--transition);
      flex-shrink: 0;
    }

    .trace-toggle.expanded {
      transform: rotate(90deg);
    }

    .trace-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      flex-shrink: 0;
    }

    .trace-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trace-status-indicators {
      display: flex;
      gap: var(--space-sm);
      flex-shrink: 0;
    }

    .trace-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--color-border);
    }

    .trace-indicator.green  { background: var(--phase-verified); border-color: var(--phase-verified); }
    .trace-indicator.orange { background: var(--phase-building); border-color: var(--phase-building); }
    .trace-indicator.grey   { background: var(--color-secondary); }
    .trace-indicator.red    { background: var(--test-failing);   border-color: var(--test-failing); }

    .trace-children {
      display: none;
      padding-left: var(--space-xl);
    }

    .trace-children.open {
      display: block;
    }

    .trace-leaf {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) var(--space-md);
      border-bottom: 1px solid var(--color-border);
    }

    .trace-leaf:last-child {
      border-bottom: none;
    }

    .trace-leaf-labels {
      display: flex;
      gap: var(--space-sm);
      margin-left: auto;
      flex-shrink: 0;
    }

    .trace-leaf-label {
      font-size: var(--font-size-xs);
      padding: 1px var(--space-sm);
      border-radius: var(--radius-sm);
      background: var(--color-secondary);
      color: var(--color-text-muted);
    }

    .trace-leaf-label.verified { background: rgba(72,187,120,0.2);  color: var(--phase-verified); }
    .trace-leaf-label.progress { background: rgba(237,137,54,0.2);  color: var(--phase-building); }
    .trace-leaf-label.failing  { background: rgba(245,101,101,0.2); color: var(--test-failing); }

    /* ---------------------------------------------------------------
       Section 4: Coverage Summary
       --------------------------------------------------------------- */
    .coverage-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: var(--space-xl);
      align-items: center;
    }

    @media (max-width: 800px) {
      .coverage-grid {
        grid-template-columns: 1fr;
        justify-items: center;
      }
    }

    .gauge-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-sm);
    }

    /* CSS-only circular gauge */
    .gauge {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .gauge svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .gauge-bg {
      fill: none;
      stroke: var(--color-secondary);
      stroke-width: 8;
    }

    .gauge-fill {
      fill: none;
      stroke: var(--color-accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .gauge-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-text);
    }

    .gauge-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      text-align: center;
    }

    .overall-coverage {
      text-align: center;
    }

    .overall-percent {
      font-size: var(--font-size-3xl);
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
    }

    .overall-label {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-top: var(--space-xs);
    }

    /* ---------------------------------------------------------------
       Footer
       --------------------------------------------------------------- */
    .site-footer {
      padding: var(--space-lg) 0;
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }

    .site-footer a {
      color: var(--color-accent);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .last-updated {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    /* ---------------------------------------------------------------
       Project Overview
       --------------------------------------------------------------- */
    .project-overview {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-xl);
    }

    .project-overview-header {
      margin-bottom: var(--space-lg);
    }

    .project-overview-name {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .project-overview-description {
      font-size: var(--font-size-base);
      color: var(--color-text-muted);
      line-height: var(--line-height);
      max-width: 72ch;
    }

    .project-overview-phase {
      margin-bottom: var(--space-lg);
    }

    .project-overview-stats {
      display: flex;
      gap: var(--space-xl);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
    }

    .stat-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ---------------------------------------------------------------
       Utility
       --------------------------------------------------------------- */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ---------------------------------------------------------------
       Custom Tooltip (replaces native title)
       --------------------------------------------------------------- */
    .tip {
      position: relative;
      cursor: help;
    }

    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #111820;
      color: #e2e8f0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      text-transform: none;
      letter-spacing: normal;
      text-align: left;
      width: max-content;
      max-width: 340px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 80ms ease;
      z-index: 200;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    .tip:hover::after {
      opacity: 1;
    }

    /* Prevent tooltip when data-tip is empty */
    .tip[data-tip=""]::after {
      display: none;
    }

    /* Downward variant for header elements */
    .tip--down::after {
      bottom: auto;
      top: calc(100% + 8px);
    }

    /* Right-aligned variant for elements near left edge */
    .tip--right::after {
      left: 0;
      transform: none;
    }

    /* ---------------------------------------------------------------
       Tech Section Tabs
       --------------------------------------------------------------- */
    .tech-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-lg);
    }

    .tech-tab {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      font-weight: 500;
      padding: var(--space-sm) var(--space-lg);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
    }

    .tech-tab:hover {
      color: var(--color-text);
    }

    .tech-tab.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    .tech-tab-panel {
      display: none;
    }

    .tech-tab-panel.active {
      display: block;
    }

    .tech-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-size-sm);
    }

    .tech-table th {
      text-align: left;
      padding: var(--space-sm) var(--space-md);
      color: var(--color-text-muted);
      font-weight: 600;
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--color-border);
    }

    .tech-table td {
      padding: var(--space-sm) var(--space-md);
      color: var(--color-text);
      border-bottom: 1px solid var(--color-border);
    }

    .tech-table tr:last-child td {
      border-bottom: none;
    }

    .tech-table .method {
      font-weight: 600;
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      min-width: 50px;
    }

    .tech-table .method-get { color: var(--phase-verified); }
    .tech-table .method-post { color: var(--color-accent); }
    .tech-table .method-put { color: var(--phase-building); }
    .tech-table .method-delete { color: var(--test-failing); }

    .tech-table .path {
      font-family: monospace;
      color: var(--color-accent);
      font-size: var(--font-size-sm);
    }

    .tech-entity {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .tech-entity-name {
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: var(--space-sm);
    }

    .tech-entity-fields {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }

    .tech-field {
      font-size: var(--font-size-xs);
      padding: 2px var(--space-sm);
      background: var(--color-secondary);
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
    }

    /* ---------------------------------------------------------------
       View Toggle
       --------------------------------------------------------------- */
    .view-toggle {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: var(--font-size-xs);
      font-weight: 600;
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .view-toggle:hover {
      color: var(--color-text);
    }

    .view-toggle.active {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    /* ---------------------------------------------------------------
       Flow Graph
       --------------------------------------------------------------- */
    .flow-graph {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-xl);
      overflow-x: auto;
    }

    .flow-graph svg {
      display: block;
      margin: 0 auto;
    }

    .flow-node {
      cursor: default;
    }

    .flow-node rect {
      rx: 6;
      ry: 6;
      stroke-width: 1.5;
      transition: opacity 150ms ease;
    }

    .flow-node text {
      font-family: var(--font-family);
      fill: var(--color-text);
      dominant-baseline: central;
      text-anchor: middle;
    }

    .flow-node .node-id {
      font-size: 10px;
      font-weight: 700;
    }

    .flow-node .node-label {
      font-size: 9px;
      fill: var(--color-text-muted);
    }

    .flow-edge {
      stroke: var(--color-border);
      stroke-width: 1.5;
      fill: none;
    }

    .flow-edge.verified { stroke: var(--phase-verified); }
    .flow-edge.progress { stroke: var(--phase-building); }

    .flow-legend {
      display: flex;
      gap: var(--space-lg);
      justify-content: center;
      margin-top: var(--space-lg);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    .flow-legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .flow-legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* ---------------------------------------------------------------
       Detail Overlay
       --------------------------------------------------------------- */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }

    .detail-overlay.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-2xl);
      overflow-y: auto;
    }

    .detail-panel {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 720px;
      padding: var(--space-xl);
      position: relative;
    }

    .detail-close {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      font-size: var(--font-size-lg);
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .detail-close:hover {
      background: var(--color-secondary);
      color: var(--color-text);
    }

    .detail-header {
      margin-bottom: var(--space-lg);
      padding-right: var(--space-2xl);
    }

    .detail-req-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: var(--space-xs);
    }

    .detail-req-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }

    .detail-req-desc {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      line-height: var(--line-height);
    }

    .detail-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-border);
    }

    .detail-section-title {
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-md);
    }

    .detail-story {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .detail-story-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .detail-story-id {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-accent);
    }

    .detail-story-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
    }

    .detail-ac-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .detail-ac-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: var(--space-xs) 0;
      font-size: var(--font-size-sm);
      border-bottom: 1px solid var(--color-border);
    }

    .detail-ac-item:last-child {
      border-bottom: none;
    }

    .detail-ac-id {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-accent);
      flex-shrink: 0;
      min-width: 70px;
    }

    .detail-ac-text {
      color: var(--color-text-muted);
      flex: 1;
    }

    .detail-ac-badges {
      display: flex;
      gap: var(--space-xs);
      flex-shrink: 0;
    }

    .detail-bs-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .detail-bs-row:last-child {
      border-bottom: none;
    }

    .detail-bs-id {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
      min-width: 60px;
    }

    .detail-bs-title {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      flex: 1;
    }
  </style>
</head>

<body>

          <svg width="62" height="19" viewBox="0 0 93 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity: 0.7;"><g clip-path="url(#wsd-clip)"><path d="M63.891 19.216C63.8902 19.2324 63.8886 19.248 63.8877 19.2629C63.8086 20.435 63.4766 21.5962 62.9039 22.6292C61.4232 25.158 59.0354 26.7188 56.2984 27.4664C50.6907 29.0005 43.6203 27.1231 39.8954 23.1758L42.058 15.6057C42.7955 17.0148 44.0477 18.0931 45.4974 18.8915C46.4584 19.4216 47.5059 19.829 48.5468 20.1269C49.8961 20.489 53.1193 21.3609 54.1537 20.073C54.2989 19.8939 54.4001 19.6726 54.4491 19.4029C54.4703 17.986 50.9477 17.3682 49.5298 16.8076C45.3424 15.7034 41.7056 12.6093 42.3656 8.27959C42.3664 8.27177 42.3672 8.26317 42.3688 8.25535C43.2287 -1.07099 56.3384 -1.90612 63.3412 2.81609L63.3289 2.85831C63.2555 3.11089 62.8647 4.4535 62.456 5.87118C61.9413 7.64934 61.3971 9.54479 61.4077 9.55417C60.8905 9.12801 60.3505 8.76362 59.8014 8.45553C57.3043 7.0488 54.6269 6.80014 53.0704 7.19189C52.4202 7.35532 51.9658 7.63057 51.801 7.97932C51.801 7.98245 51.7986 7.98558 51.7969 7.9887C51.748 8.09661 51.7268 8.21078 51.7357 8.3312C51.7349 8.33276 51.7349 8.33511 51.7357 8.33667C51.7308 8.73234 51.9438 9.13035 52.3827 9.30395C52.4202 9.31959 52.4585 9.33523 52.4969 9.35086C54.8659 10.3236 58.2563 10.9672 60.5544 12.5702C60.5993 12.6014 60.6433 12.6327 60.6866 12.6648C63.0181 14.0785 64.0509 16.6676 63.891 19.216ZM17.3673 0.629751L13.0339 15.7996H12.7451L8.4116 0.629751H0L7.59582 27.2161H16.7327L21.0661 12.0463H21.3549L25.6884 27.2161H32.6487L25.0537 0.629751H17.3673ZM34.0094 0.629751L31.4895 9.45095L35.6949 24.172L42.4211 0.629751H34.0094ZM93 13.7728C93 16.1007 92.5603 18.1165 91.6817 19.8189C90.8023 21.5219 89.6283 22.917 88.1591 24.0054C86.6891 25.0947 84.9971 25.9017 83.0824 26.4279C81.167 26.9534 79.1724 27.2161 77.1003 27.2161H65.9231V0.629751H76.313C78.5173 0.629751 80.6228 0.836186 82.6297 1.24906C84.6365 1.66193 86.4076 2.37585 87.9429 3.38926C89.4774 4.40345 90.7036 5.74919 91.6229 7.4257C92.5407 9.10299 93 11.2182 93 13.772V13.7728ZM83.5156 13.679C83.5156 11.9571 82.925 10.6168 81.7446 9.65583C80.5641 8.69559 78.9896 8.21469 77.0219 8.21469H74.3356V19.5178H76.6679C78.8722 19.5178 80.5641 19.0627 81.7446 18.1517C82.925 17.2408 83.5156 15.7504 83.5156 13.679Z" fill="#ffffff"/></g><defs><clipPath id="wsd-clip"><rect width="93" height="28" fill="white"/></clipPath></defs></svg>
          <h1 class="project-name" id="projectName">RCF Project Dashboard</h1>
          <span class="phase-badge" id="phaseBadge" data-phase="new">New</span>
        </div>
        <div class="header-right">
          <div class="connection-indicator">
            <span class="connection-dot" id="connectionDot" title="Live file watcher - updates dashboard when RCF documents change"></span>
          </div>

  <!-- ====================================================================
       Main content
       ==================================================================== -->
  <main>
    <div class="container">

      <!-- Section 0: Project Overview -->
      <section class="section" id="sectionOverview">
        <div id="overviewContent"></div>
      </section>

      <!-- Section 1: Pipeline Board -->
      <section class="section" id="sectionPipeline">
        <h2 class="section-title">Requirement Status</h2>
        <div id="pipelineContent"></div>
      </section>

      <!-- Section 2: Build Specs Progress -->
      <section class="section" id="sectionBuildSpecs">
        <h2 class="section-title">Build Progress</h2>
        <div id="buildSpecsContent"></div>
      </section>

      <!-- Section 2b: Technical Design (collapsible) -->
      <section class="section" id="sectionTech">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--color-border);">
          <h2 style="font-size: var(--font-size-lg); font-weight: 600; color: var(--color-text); margin: 0; cursor: pointer;" onclick="toggleTechSection()">
            <span id="techToggleIcon" style="display: inline-block; transition: transform 150ms; transform: rotate(0deg); margin-right: var(--space-xs);">&#9654;</span>
            Technical Design
          </h2>
          <a id="techReportLink" href="/api/tech-report" target="_blank" rel="noopener" style="display: none; align-items: center; gap: var(--space-xs); padding: var(--space-xs) var(--space-md); background: var(--color-secondary); color: var(--color-text); border-radius: var(--radius-sm); font-size: var(--font-size-xs); font-weight: 600; text-decoration: none; white-space: nowrap;">Export PDF &#8599;</a>
        </div>
        <div id="techContent" style="display: none;"></div>

      <!-- Section 3: Traceability Matrix -->
      <section class="section" id="sectionTrace">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--color-border);">
          <h2 style="font-size: var(--font-size-lg); font-weight: 600; color: var(--color-text); margin: 0;">Traceability</h2>
          <div style="display: flex; gap: 2px; background: var(--color-secondary); border-radius: var(--radius-sm); padding: 2px;">
            <button class="view-toggle" id="toggleTree" onclick="setTraceView('tree')" title="Tree view">Tree</button>
            <button class="view-toggle active" id="toggleGraph" onclick="setTraceView('graph')" title="Flow diagram">Flow</button>
          </div>
        </div>
        <div id="traceContent" style="display: none;"></div>
        <div id="traceGraphContent"></div>
      </section>

      <!-- Section 4: Coverage Summary -->
      <section class="section" id="sectionCoverage">
        <h2 class="section-title">Production Readiness</h2>
        <div id="coverageContent"></div>

  <!-- ====================================================================
       Footer
       ==================================================================== -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <span>Built on RCF Methodology</span>
        <span class="last-updated" id="lastUpdated">Last updated: --</span>
      </div>
    </div>
  </footer>

  <!-- Detail overlay (populated by JS when a requirement is clicked) -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel" id="detailPanel"></div>
  </div>

  <!-- ====================================================================
       Application logic
       ==================================================================== -->
  <script type="module">

    // -------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------

    let projectData = null;
    let sseConnected = false;
    let traceView = 'graph'; // 'tree' or 'graph' -- default to flow

    // -------------------------------------------------------------------
    // Data fetching
    // -------------------------------------------------------------------

    async function fetchProjectData() {
      try {
        const res = await fetch('/api/project');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        projectData = await res.json();
        render();
      } catch (err) {
        console.error('Failed to fetch project data:', err);
      }
    }

    // -------------------------------------------------------------------
    // SSE connection
    // -------------------------------------------------------------------

    function connectSSE() {
      const es = new EventSource('/api/events');

      es.addEventListener('connected', () => {
        sseConnected = true;
        updateConnectionUI();
      });

      es.addEventListener('change', (event) => {
        // Re-fetch all data on any file change
        fetchProjectData();
      });

      es.onerror = () => {
        sseConnected = false;
        updateConnectionUI();
        es.close();
        // Retry after 5 seconds
        setTimeout(connectSSE, 5000);
      };
    }

    function updateConnectionUI() {
      const dot = document.getElementById('connectionDot');
      if (sseConnected) {
        dot.classList.add('connected');
      } else {
        dot.classList.remove('connected');
      }
    }

    // -------------------------------------------------------------------
    // Rendering
    // -------------------------------------------------------------------

    function render() {
      if (!projectData) return;

      renderHeader();
      renderOverview();
      renderPipeline();
      renderBuildSpecs();
      renderTechDesign();
      renderTrace();
      if (traceView === 'graph') renderFlowGraph();
      renderCoverage();
      renderTimestamp();
    }

    // --- Header --------------------------------------------------------

    function renderHeader() {
      const { project } = projectData;
      if (!project) return;

      document.getElementById('projectName').textContent = 'RCF Project Dashboard';
      document.title = `${project.name || 'Project'} -- RCF Dashboard`;

      const badge = document.getElementById('phaseBadge');
      const phase = project.phase || 'new';
      badge.dataset.phase = phase;
      badge.textContent = phase;

      const phaseTips = {
        new: 'Project created, no requirements defined yet',
        defined: 'Requirements captured -- run /design to generate the technical design',
        designed: 'Technical design and build specs ready -- run /build to start coding',
        building: 'Build cycle in progress -- one or more specs being implemented',
        testing: 'Tests running against the built code',
        verified: 'All build specs verified -- every requirement has code and passing tests',
        presented: 'Presentation materials generated -- ready to demo',
      };
      badge.classList.add('tip', 'tip--down');
      badge.dataset.tip = phaseTips[phase] || '';
    }

    // --- Project Overview -----------------------------------------------

    function renderOverview() {
      const container = document.getElementById('overviewContent');
      const { project, prd, buildSpecs, testSpecs } = projectData;

      if (!project) {
        container.innerHTML = renderEmptyState(
          'No project defined yet.',
          'Open Claude Code and run <code>/define</code> to get started.'
        );
        return;
      }

      const totalReqs = prd?.requirements?.length || 0;
      const totalAc = (prd?.requirements || []).reduce((sum, r) =>
        sum + (r.stories || []).reduce((s2, st) => s2 + (st.acceptanceCriteria?.length || 0), 0)
      , 0);

      const totalBs = (buildSpecs || []).length;
      const verifiedBs = (buildSpecs || []).filter(bs => bs.status === 'verified').length;

      let passingTests = 0;
      for (const ts of (testSpecs || [])) {
        passingTests += (ts.testCases || []).filter(tc => tc.status === 'passing').length;
      }

      const phase = project.phase || 'new';
      const description = project.description || '';

      let html = '<div class="project-overview">';
      html += '<div class="project-overview-header">';
      html += `<div style="display: flex; align-items: center; justify-content: space-between; gap: var(--space-md);">`;
      html += `<div class="project-overview-name"><span style="color: var(--color-text-muted); font-weight: 400;">Project:</span> ${esc(project.name || 'Untitled Project')}</div>`;
      const appPort = projectData?._meta?.appPort || 3000;
      html += `<a href="http://localhost:${appPort}" target="_blank" rel="noopener" style="display: inline-flex; align-items: center; gap: var(--space-xs); padding: var(--space-xs) var(--space-md); background: var(--color-accent); color: var(--color-bg); border-radius: var(--radius-sm); font-size: var(--font-size-sm); font-weight: 600; text-decoration: none; white-space: nowrap; transition: opacity 150ms;">Open App &#8599;</a>`;
      html += '</div>';
      if (description) {
        html += `<div class="project-overview-description">${esc(description)}</div>`;
      }
      html += '</div>';
      html += `<div class="project-overview-phase">
        <span class="phase-badge" data-phase="${phase}">${capitalize(phase)}</span>
      </div>`;
      html += '<div class="project-overview-stats">';
      html += `<div class="stat-item"><span class="stat-value">${totalReqs}</span><span class="stat-label">Requirements</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${totalAc}</span><span class="stat-label">Acceptance Criteria</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${verifiedBs}/${totalBs}</span><span class="stat-label">Build Specs Verified</span></div>`;
      html += `<div class="stat-item"><span class="stat-value">${passingTests}</span><span class="stat-label">Tests Passing</span></div>`;

      // Total build time from earliest startedAt to latest completedAt
      const starts = (buildSpecs || []).map(bs => bs.startedAt).filter(Boolean).sort();
      const ends = (buildSpecs || []).map(bs => bs.completedAt).filter(Boolean).sort();
      if (starts.length > 0 && ends.length > 0) {
        const totalTime = formatDuration(starts[0], ends[ends.length - 1]);
        if (totalTime) {
          html += `<div class="stat-item"><span class="stat-value">${totalTime}</span><span class="stat-label">Total Build Time</span></div>`;
        }
      }

      html += '</div>';
      html += '</div>';

      container.innerHTML = html;
    }

    // --- Pipeline Board ------------------------------------------------

    function renderPipeline() {
      const container = document.getElementById('pipelineContent');
      const { prd, buildSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState(
          'No requirements defined yet.',
          'Run <code>/define</code> to get started.'
        );
        return;
      }

      // Determine the furthest stage for each requirement based on its build specs
      const stageOrder = ['defined', 'designed', 'building', 'testing', 'verified'];
      const stageMap = { ready: 'defined', defining: 'defined', building: 'building', reviewing: 'testing', testing: 'testing', verified: 'verified' };

      // Map requirements to their pipeline stage
      const columns = {
        defined:  [],
        designed: [],
        building: [],
        testing:  [],
        verified: [],
      };

      for (const req of prd.requirements) {
        // Find build specs for this requirement (requirement can be a string or array)
        const reqSpecs = (buildSpecs || []).filter(bs => {
          const reqs = Array.isArray(bs.requirement) ? bs.requirement : [bs.requirement];
          return reqs.includes(req.id);
        });

        // Count total AC and passing tests
        const totalAc = (req.stories || []).reduce((sum, s) => sum + (s.acceptanceCriteria?.length || 0), 0);
        const passingTests = countPassingTestsForReq(req.id);

        let stage = 'defined'; // default
        if (reqSpecs.length > 0) {
          // LEAST advanced spec determines the requirement's stage.
          // A requirement isn't "verified" until ALL its specs are verified.
          let minIdx = stageOrder.length - 1;
          for (const bs of reqSpecs) {
            const mapped = stageMap[bs.status] || 'defined';
            const idx = stageOrder.indexOf(mapped);
            if (idx < minIdx) minIdx = idx;
          }
          stage = stageOrder[minIdx];
        }

        // If there are build specs but the req has no stage past defined,
        // check if design exists to mark as designed
        if (stage === 'defined' && projectData.design) {
          const hasDesign = projectData.design.components?.some(c =>
            c.tracesTo?.includes(req.id)
          );
          if (hasDesign) stage = 'designed';
        }

        columns[stage].push({
          id: req.id,
          title: req.title,
          priority: req.priority || 'could',
          acCount: totalAc,
          passingTests,
        });
      }

      const stageTooltips = {
        defined:  'Requirements captured with acceptance criteria',
        designed: 'Technical design and build specs generated',
        building: 'Code is being written against the build spec',
        testing:  'Tests are running against the built code',
        verified: 'All tests passing -- requirement is complete and traceable',
      };

      let html = '<div class="pipeline-board">';
      for (const stage of stageOrder) {
        const cards = columns[stage];
        html += `
          <div class="pipeline-column" data-stage="${stage}">
            <div class="pipeline-column-header tip" data-tip="${stageTooltips[stage] || ''}">
              <span>${capitalize(stage)}</span>
              <span class="count">${cards.length}</span>
            </div>
            <div class="pipeline-cards">
              ${cards.length === 0 ? '' : cards.map(c => `

    // --- Coverage Summary ----------------------------------------------

    function renderCoverage() {
      const container = document.getElementById('coverageContent');
      const { prd, buildSpecs, testSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState(
          'No coverage data yet.',
          'Coverage tracks as you progress through the RCF cycle.'
        );
        return;
      }

      const totalReqs = prd.requirements.length;
      const totalAc = prd.requirements.reduce((sum, r) =>
        sum + (r.stories || []).reduce((s2, st) => s2 + (st.acceptanceCriteria?.length || 0), 0)
      , 0);

      // --- 1. Requirements Coverage ---
      // A production app needs more than functional requirements.
      // Estimate: functional reqs are typically ~30% of a full spec.
      // The rest: security, compliance, non-functional (perf, a11y,
      // resilience), operational (deploy, CI/CD, monitoring, logging),
      // data (backup, migration), integration.
      const PRODUCTION_MULTIPLIER = 3.5;
      const estProdReqs = Math.round(totalReqs * PRODUCTION_MULTIPLIER);
      const reqCovPct = estProdReqs > 0 ? Math.min(100, Math.round((totalReqs / estProdReqs) * 100)) : 0;

      // --- 2. Requirements Depth ---
      // For the reqs we have, how thoroughly specified?
      const TARGET_AC_PER_REQ = 7;
      const depthPct = totalReqs > 0 ? Math.min(100, Math.round((totalAc / (totalReqs * TARGET_AC_PER_REQ)) * 100)) : 0;
      const avgAcPerReq = totalReqs > 0 ? (totalAc / totalReqs).toFixed(1) : 0;

      // --- 3. Test Depth ---
      // Tests per AC vs production target. One test per AC is a smoke
      // test, not coverage. Production needs happy path + edge cases +
      // error handling + integration per AC.
      let totalPassingTests = 0;
      for (const ts of (testSpecs || [])) {
        totalPassingTests += (ts.testCases || []).filter(tc => tc.status === 'passing').length;
      }
      const TARGET_TESTS_PER_AC = 5;
      const targetTests = totalAc * TARGET_TESTS_PER_AC;
      const testDepthPct = targetTests > 0 ? Math.min(100, Math.round((totalPassingTests / targetTests) * 100)) : 0;
      const avgTestsPerAc = totalAc > 0 ? (totalPassingTests / totalAc).toFixed(1) : 0;

      // --- Production Readiness ---
      // Weighted toward the weakest dimension. You're only as
      // production-ready as your biggest gap.
      const scores = [reqCovPct, depthPct, testDepthPct];
      const minScore = Math.min(...scores);
      const avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
      const overallPct = Math.round(minScore * 0.5 + avgScore * 0.5);

      const circumference = 2 * Math.PI * 48;

      // --- Context notes ---
      const notes = [];

      const missingAreas = ['security (authentication, data protection)', 'compliance (audit trails, data retention)', 'non-functional (performance, accessibility, resilience)', 'operational (deployment, CI/CD, monitoring, logging)'];
      if (reqCovPct < 80) {
        notes.push(`<strong>${totalReqs} functional requirements defined.</strong> A production-ready app would also need requirements for ${missingAreas.join('; ')}. Estimated ~${estProdReqs} total requirements for production.`);
      }

      if (depthPct < 80) {
        notes.push(`<strong>Requirements are lightly specified</strong> at ${avgAcPerReq} acceptance criteria per requirement. Production depth is typically ~${TARGET_AC_PER_REQ} per requirement, covering edge cases, error handling, and boundary conditions.`);
      }

      if (testDepthPct < 80) {
        notes.push(`<strong>Test coverage is thin</strong> at ${avgTestsPerAc} tests per acceptance criterion. Production suites need ~${TARGET_TESTS_PER_AC} per AC: happy path, edge cases, error handling, and integration tests.`);
      }

      if (overallPct < 50) {
        notes.push(`This is a working prototype. The gaps above represent the distance to a production-ready product -- deeper specifications, broader requirement coverage, and comprehensive test suites.`);
      }

      const noteHtml = notes.length > 0
        ? `<div style="margin-top: var(--space-lg); padding: var(--space-md); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); font-size: var(--font-size-sm); color: var(--color-text-muted); line-height: 1.6;">${notes.map(n => `<p style="margin: var(--space-xs) 0;">${n}</p>`).join('')}</div>`
        : '';

      container.innerHTML = `
        <div class="coverage-grid">
          ${renderGauge(reqCovPct, `Req. Coverage (${totalReqs} / ~${estProdReqs} areas)`, circumference)}
          ${renderGauge(depthPct, `Req. Depth (${avgAcPerReq} / ${TARGET_AC_PER_REQ} AC/req)`, circumference)}
          ${renderGauge(testDepthPct, `Test Depth (${avgTestsPerAc} / ${TARGET_TESTS_PER_AC} tests/AC)`, circumference)}
          <div class="overall-coverage">
            <div class="overall-percent">${overallPct}%</div>
            <div class="overall-label">Production Readiness</div>
          </div>
        </div>${noteHtml}`;
    }

    function renderGauge(pct, label, circumference) {
      const offset = circumference - (pct / 100) * circumference;
      return `
        <div class="gauge-wrapper">
          <div class="gauge">
            <svg viewBox="0 0 120 120">
              <circle class="gauge-bg" cx="60" cy="60" r="48" />
              <circle class="gauge-fill" cx="60" cy="60" r="48"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}" />
            </svg>
            <span class="gauge-text">${pct}%</span>
          </div>
          <span class="gauge-label">${label}</span>
        </div>`;
    }

    function renderEmptyState(title, hint) {
      return `<div class="empty-state"><p>${title}</p><p>${hint}</p></div>`;
    }

    function formatDuration(startIso, endIso) {
      if (!startIso || !endIso) return '';
      const ms = new Date(endIso) - new Date(startIso);
      if (ms < 0 || isNaN(ms)) return '';
      const secs = Math.floor(ms / 1000);
      if (secs < 60) return `${secs}s`;
      const mins = Math.floor(secs / 60);
      const remSecs = secs % 60;
      return remSecs > 0 ? `${mins}m ${remSecs}s` : `${mins}m`;
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function esc(s) {
      if (!s) return '';
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    function countPassingTestsForReq(reqId) {
      const { testSpecs, buildSpecs } = projectData;
      if (!testSpecs || !buildSpecs) return 0;
      const reqBsIds = new Set(buildSpecs.filter(bs => {
        const reqs = Array.isArray(bs.requirement) ? bs.requirement : [bs.requirement];
        return reqs.includes(reqId);
      }).map(bs => bs.id));
      let count = 0;
      for (const ts of testSpecs) {
        if (reqBsIds.has(ts.buildSpec)) {
          count += (ts.testCases || []).filter(tc => tc.status === 'passing').length;
        }
      }
      return count;
    }

    function getReqColour(req, buildSpecs, testSpecs) {
      const reqBs = (buildSpecs || []).filter(bs => {
        const reqs = Array.isArray(bs.requirement) ? bs.requirement : [bs.requirement];
        return reqs.includes(req.id);
      });
      if (reqBs.length === 0) return 'grey';
      if (reqBs.every(bs => bs.status === 'verified')) return 'green';
      if (reqBs.some(bs => ['building', 'reviewing', 'testing', 'defining'].includes(bs.status))) return 'orange';
      // Check for failing tests
      for (const bs of reqBs) {
        const ts = (testSpecs || []).filter(t => t.buildSpec === bs.id);
        if (ts.some(t => t.status === 'failed')) return 'red';
      }
      return 'grey';
    }

    function getStoryColour(story, reqId, bsByReqStory, tsByBs) {
      const key = `${reqId}/${story.id}`;
      const specs = bsByReqStory[key] || [];
      if (specs.length === 0) return 'grey';
      if (specs.every(bs => bs.status === 'verified')) return 'green';
      if (specs.some(bs => ['building', 'reviewing', 'testing', 'defining'].includes(bs.status))) return 'orange';
      return 'grey';
    }

    function getAcBuildStatus(acId, buildSpecs) {
      for (const bs of (buildSpecs || [])) {
        if ((bs.acceptanceCriteria || []).includes(acId)) {
          if (bs.status === 'verified') return { text: 'Code complete', cls: 'verified', tip: 'Code implemented, reviewed, and verified' };
          if (bs.status === 'building') return { text: 'Building', cls: 'progress', tip: 'Code is being written for this criterion' };
          if (bs.status === 'reviewing') return { text: 'In review', cls: 'progress', tip: 'Code written, under review against standards' };
          if (bs.status === 'testing') return { text: 'Testing', cls: 'progress', tip: 'Code built, tests are running' };
          if (bs.status === 'defining') return { text: 'Tests being defined', cls: 'progress', tip: 'Test cases are being written from this criterion' };
          return { text: 'Queued', cls: '', tip: 'Build spec assigned, waiting to start' };
        }
      }
      return { text: 'No build spec', cls: '', tip: 'No build spec covers this criterion yet' };
    }

    function getAcTestStatus(acId, testSpecs) {
      for (const ts of (testSpecs || [])) {
        for (const tc of (ts.testCases || [])) {
          if (tc.verifiesAc === acId) {
            if (tc.status === 'passing') return { text: 'Test passing', cls: 'verified', tip: 'Automated test verifies this criterion' };
            if (tc.status === 'failing') return { text: 'Test failing', cls: 'failing', tip: 'Automated test exists but is currently failing' };
            return { text: 'Test defined', cls: 'progress', tip: 'Test case written, not yet run' };
          }
        }
      }
      return { text: 'Untested', cls: '', tip: 'No automated test covers this criterion -- visual/integration criteria are verified during review instead' };
    }

    // --- Flow Graph Rendering -------------------------------------------

    function renderFlowGraph() {
      const container = document.getElementById('traceGraphContent');
      const { prd, buildSpecs, testSpecs } = projectData;

      if (!prd || !prd.requirements || prd.requirements.length === 0) {
        container.innerHTML = renderEmptyState('No traceability data.', 'Define requirements first.');
        return;
      }

      // Collect all nodes with their type and status
      const nodes = [];
      const edges = [];

      // Column layout: REQ -> US -> AC -> BS -> TS
      const cols = { req: [], us: [], ac: [], bs: [], ts: [] };

      for (const req of prd.requirements) {
        const reqColour = getReqColour(req, buildSpecs, testSpecs);
        cols.req.push({ id: req.id, label: req.title, colour: reqColour, type: 'req' });

        for (const story of (req.stories || [])) {
          cols.us.push({ id: story.id, label: story.title, colour: reqColour, type: 'us' });
          edges.push({ from: req.id, to: story.id, colour: reqColour });

          for (const ac of (story.acceptanceCriteria || [])) {
            const buildSt = getAcBuildStatus(ac.id, buildSpecs);
            const acColour = buildSt.cls === 'verified' ? 'green' : (buildSt.cls === 'progress' ? 'orange' : 'grey');
            const acLabel = ac.given ? `Given ${ac.given.substring(0, 30)}${ac.given.length > 30 ? '...' : ''}` : ac.id;
            cols.ac.push({ id: ac.id, label: acLabel, colour: acColour, type: 'ac' });
            edges.push({ from: story.id, to: ac.id, colour: acColour });
          }
        }
      }

      // Build specs
      for (const bs of (buildSpecs || [])) {
        const bsColour = bs.status === 'verified' ? 'green' : (['building','reviewing','testing','defining'].includes(bs.status) ? 'orange' : 'grey');
        cols.bs.push({ id: bs.id, label: bs.title, colour: bsColour, type: 'bs' });

        // Edges from ACs to build specs
        for (const acId of (bs.acceptanceCriteria || [])) {
          edges.push({ from: acId, to: bs.id, colour: bsColour });
        }
      }

      // Test specs
      for (const ts of (testSpecs || [])) {
        const anyFailing = (ts.testCases || []).some(tc => tc.status === 'failing');
        const allPassing = (ts.testCases || []).every(tc => tc.status === 'passing');
        const tsColour = anyFailing ? 'red' : (allPassing ? 'green' : 'orange');
        const passingCount = (ts.testCases || []).filter(tc => tc.status === 'passing').length;
        cols.ts.push({ id: ts.id, label: `${passingCount}/${(ts.testCases || []).length} passing`, colour: tsColour, type: 'ts' });
        edges.push({ from: ts.buildSpec, to: ts.id, colour: tsColour });
      }

      // Layout calculations
      const colOrder = ['req', 'us', 'ac', 'bs', 'ts'];
      const colLabels = { req: 'Requirements', us: 'Stories', ac: 'Criteria', bs: 'Build Specs', ts: 'Tests' };
      const nodeW = 140, nodeH = 40, colGap = 60, rowGap = 16, headerH = 30, padX = 30, padY = 20;
      const maxRows = Math.max(...colOrder.map(c => cols[c].length), 1);
      const svgW = colOrder.length * (nodeW + colGap) - colGap + padX * 2;
      const svgH = maxRows * (nodeH + rowGap) - rowGap + padY * 2 + headerH;

      // Assign positions
      const positions = {};
      for (let ci = 0; ci < colOrder.length; ci++) {
        const col = colOrder[ci];
        const items = cols[col];
        const x = padX + ci * (nodeW + colGap);
        const totalH = items.length * (nodeH + rowGap) - rowGap;
        const startY = padY + headerH + (maxRows * (nodeH + rowGap) - rowGap - totalH) / 2;
        for (let ri = 0; ri < items.length; ri++) {
          positions[items[ri].id] = { x, y: startY + ri * (nodeH + rowGap), ...items[ri] };
        }
      }

      const colourMap = { green: 'var(--phase-verified)', orange: 'var(--phase-building)', grey: 'var(--color-secondary)', red: 'var(--test-failing)' };
      const fillMap = { green: 'rgba(72,187,120,0.15)', orange: 'rgba(237,137,54,0.15)', grey: 'rgba(113,128,150,0.1)', red: 'rgba(245,101,101,0.15)' };

      let svg = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

      // Column headers
      for (let ci = 0; ci < colOrder.length; ci++) {
        const x = padX + ci * (nodeW + colGap) + nodeW / 2;
        svg += `<text x="${x}" y="${padY + 10}" fill="var(--color-text-muted)" font-size="11" font-weight="600" text-anchor="middle" font-family="var(--font-family)" text-transform="uppercase" letter-spacing="0.05em">${colLabels[colOrder[ci]]}</text>`;
      }

      // Edges
      for (const edge of edges) {
        const from = positions[edge.from];
        const to = positions[edge.to];
        if (!from || !to) continue;
        const x1 = from.x + nodeW;
        const y1 = from.y + nodeH / 2;
        const x2 = to.x;
        const y2 = to.y + nodeH / 2;
        const cx = (x1 + x2) / 2;
        svg += `<path class="flow-edge ${edge.colour === 'green' ? 'verified' : (edge.colour === 'orange' ? 'progress' : '')}" d="M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}" />`;
      }

      // Nodes
      for (const [id, pos] of Object.entries(positions)) {
        const stroke = colourMap[pos.colour] || colourMap.grey;
        const fill = fillMap[pos.colour] || fillMap.grey;
        const truncLabel = pos.label.length > 18 ? pos.label.substring(0, 17) + '...' : pos.label;
        svg += `<g class="flow-node">`;
        svg += `<rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" fill="${fill}" stroke="${stroke}" />`;
        svg += `<text x="${pos.x + nodeW/2}" y="${pos.y + 15}" class="node-id" fill="var(--color-accent)" font-family="var(--font-family)">${esc(id)}</text>`;
        svg += `<text x="${pos.x + nodeW/2}" y="${pos.y + 29}" class="node-label" font-family="var(--font-family)">${esc(truncLabel)}</text>`;
        svg += `</g>`;
      }

      svg += '</svg>';

      container.innerHTML = `
        <div class="flow-graph">${svg}</div>
        <div class="flow-legend">
          <div class="flow-legend-item"><span class="flow-legend-swatch" style="background: var(--phase-verified);"></span> Verified</div>
          <div class="flow-legend-item"><span class="flow-legend-swatch" style="background: var(--phase-building);"></span> In progress</div>
          <div class="flow-legend-item"><span class="flow-legend-swatch" style="background: var(--color-secondary);"></span> Not started</div>
        </div>`;
    }

    // --- Requirement Detail Overlay ------------------------------------

    window.showReqDetail = function(reqId) {
      if (!projectData || !projectData.prd) return;

      const req = projectData.prd.requirements.find(r => r.id === reqId);
      if (!req) return;

      const { buildSpecs, testSpecs } = projectData;

      const reqBuildSpecs = (buildSpecs || []).filter(bs => {
        const reqs = Array.isArray(bs.requirement) ? bs.requirement : [bs.requirement];
        return reqs.includes(reqId);
      });

      let html = `
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div class="detail-header">
          <div class="detail-req-id">${esc(reqId)}</div>
          <div class="detail-req-title">${esc(req.title)}</div>
          ${req.description ? `<div class="detail-req-desc">${esc(req.description)}</div>` : ''}
        </div>`;

      // Stories and acceptance criteria
      if (req.stories && req.stories.length > 0) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">User Stories &amp; Acceptance Criteria</div>';

        for (const story of req.stories) {
          html += `<div class="detail-story">
            <div class="detail-story-header">
              <span class="detail-story-id">${esc(story.id)}</span>
              <span class="detail-story-title">${esc(story.title)}</span>
            </div>`;

          if (story.acceptanceCriteria && story.acceptanceCriteria.length > 0) {
            html += '<ul class="detail-ac-list">';
            for (const ac of story.acceptanceCriteria) {
              const buildStatus = getAcBuildStatus(ac.id, buildSpecs);
              const testStatus = getAcTestStatus(ac.id, testSpecs);
              const acText = ac.given
                ? `Given ${ac.given}, when ${ac.when || '...'}, then ${ac.then || '...'}`
                : (ac.description || ac.id);

              html += `<li class="detail-ac-item">
                <span class="detail-ac-id">${esc(ac.id)}</span>
                <span class="detail-ac-text">${esc(acText)}</span>
                <div class="detail-ac-badges">
                  <span class="trace-leaf-label tip ${buildStatus.cls}" data-tip="${buildStatus.tip}">${esc(buildStatus.text)}</span>
                  <span class="trace-leaf-label tip ${testStatus.cls}" data-tip="${testStatus.tip}">${esc(testStatus.text)}</span>
                </div>
              </li>`;
            }
            html += '</ul>';
          }
          html += '</div>';
        }
        html += '</div>';
      }

      // Build specs
      if (reqBuildSpecs.length > 0) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">Build Specs</div>';
        for (const bs of reqBuildSpecs) {
          html += `<div class="detail-bs-row">
            <span class="detail-bs-id">${esc(bs.id)}</span>
            <span class="detail-bs-title">${esc(bs.title)}</span>
            <span class="status-badge tip" data-status="${bs.status}" data-tip="${bsStatusTips[bs.status] || ''}">${esc(bs.status)}</span>
          </div>`;
        }
        html += '</div>';
      }

      document.getElementById('detailPanel').innerHTML = html;
      document.getElementById('detailOverlay').classList.add('open');
    };

    window.showBsDetail = function(bsId) {
      if (!projectData) return;

      const bs = (projectData.buildSpecs || []).find(b => b.id === bsId);
      if (!bs) return;

      const { testSpecs, prd } = projectData;

      // Find linked test spec
      const linkedTs = (testSpecs || []).find(ts => ts.buildSpec === bsId);

      // Find linked requirements
      const bsReqs = Array.isArray(bs.requirement) ? bs.requirement : [bs.requirement];
      const linkedReqs = bsReqs.map(rid => (prd?.requirements || []).find(r => r.id === rid)).filter(Boolean);

      let html = `
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div class="detail-header">
          <div class="detail-req-id">${esc(bsId)}</div>
          <div class="detail-req-title">${esc(bs.title)}</div>
          <div style="margin-top: var(--space-sm); display: flex; align-items: center; gap: var(--space-md);">
            <span class="status-badge tip" data-status="${bs.status}" data-tip="${bsStatusTips[bs.status] || ''}">${esc(bs.status)}</span>
            ${bs.startedAt && bs.completedAt ? `<span style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Built in ${formatDuration(bs.startedAt, bs.completedAt)}</span>` : bs.startedAt ? '<span style="font-size: var(--font-size-sm); color: var(--color-text-muted);">Building...</span>' : ''}
          </div>
        </div>`;

      // Build spec content -- the actual spec/prompt
      if (bs.description || bs.designContext) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">Build Specification</div>';
        if (bs.description) {
          html += `<p style="font-size: var(--font-size-sm); color: var(--color-text); margin-bottom: var(--space-md); line-height: 1.6;">${esc(bs.description)}</p>`;
        }
        if (bs.designContext) {
          html += `<div style="background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: var(--space-md); font-size: var(--font-size-sm); color: var(--color-text-muted); line-height: 1.6; font-family: monospace;">
            <div style="font-size: var(--font-size-xs); font-weight: 600; color: var(--color-accent); margin-bottom: var(--space-xs); text-transform: uppercase; letter-spacing: 0.05em;">Design Context</div>
            ${esc(bs.designContext)}
          </div>`;
        }
        if (bs.standards && bs.standards.length > 0) {
          html += `<div style="margin-top: var(--space-sm); font-size: var(--font-size-xs); color: var(--color-text-muted);">Standards applied: ${bs.standards.map(s => `<span style="color: var(--color-accent);">${esc(s)}</span>`).join(', ')}</div>`;
        }
        html += '</div>';
      }

      // Linked requirements
      if (linkedReqs.length > 0) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">Traces to Requirements</div>';
        for (const req of linkedReqs) {
          html += `<div class="detail-bs-row" style="cursor: pointer;" onclick="closeDetail(); setTimeout(() => showReqDetail(\'${req.id}\'), 100);">
            <span class="detail-bs-id">${esc(req.id)}</span>
            <span class="detail-bs-title">${esc(req.title)}</span>
          </div>`;
        }
        html += '</div>';
      }

      // Acceptance criteria this spec covers
      if (bs.acceptanceCriteria && bs.acceptanceCriteria.length > 0) {
        html += '<div class="detail-section">';
        html += '<div class="detail-section-title">Acceptance Criteria Covered</div>';
        html += '<ul class="detail-ac-list">';
        for (const acId of bs.acceptanceCriteria) {
          const buildStatus = getAcBuildStatus(acId, projectData.buildSpecs);
          const testStatus = getAcTestStatus(acId, testSpecs);
          html += `<li class="detail-ac-item">
            <span class="detail-ac-id">${esc(acId)}</span>
            <div class="detail-ac-badges">
              <span class="trace-leaf-label tip ${buildStatus.cls}" data-tip="${buildStatus.tip}">${esc(buildStatus.text)}</span>
              <span class="trace-leaf-label tip ${testStatus.cls}" data-tip="${testStatus.tip}">${esc(testStatus.text)}</span>
            </div>
          </li>`;
        }
        html += '</ul></div>';
      }

      // Test results
      if (linkedTs) {
        const passing = (linkedTs.testCases || []).filter(tc => tc.status === 'passing').length;
        const failing = (linkedTs.testCases || []).filter(tc => tc.status === 'failing').length;
        const total = (linkedTs.testCases || []).length;

        html += '<div class="detail-section">';
        html += `<div class="detail-section-title">Tests (${esc(linkedTs.id)}) -- ${passing}/${total} passing</div>`;
        for (const tc of (linkedTs.testCases || [])) {
          const statusCls = tc.status === 'passing' ? 'verified' : (tc.status === 'failing' ? 'failing' : 'progress');
          html += `<div class="detail-bs-row">
            <span class="detail-bs-id">${esc(tc.id)}</span>
            <span class="detail-bs-title">${esc(tc.description)}</span>
            <span class="trace-leaf-label ${statusCls}">${esc(tc.status)}</span>
          </div>`;
        }
        html += '</div>';
      }

      document.getElementById('detailPanel').innerHTML = html;
      document.getElementById('detailOverlay').classList.add('open');
    };

    window.closeDetail = function() {
      document.getElementById('detailOverlay').classList.remove('open');
    };

    // Close overlay on backdrop click or Escape
    document.getElementById('detailOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'detailOverlay') closeDetail();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDetail();
    });

    // -------------------------------------------------------------------
    // Init
    // -------------------------------------------------------------------

    fetchProjectData();
    connectSSE();

  </script>
</body>
</html>
